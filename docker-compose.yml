services:

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - propman

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    dns:
    - 8.8.8.8
    - 8.8.4.4
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=citus-coordinator
      - DB_PORT=5432
      - DB_DATABASE=propman
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - PHP_MEMORY_LIMIT=512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - citus-coordinator
      - redis
    networks:
      - propman
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    depends_on:
      - redis
      - php
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - propman

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - php
      - redis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - propman

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - propman

  # -----------------------------
  # Citus Coordinator (Main DB)
  # -----------------------------
  citus-coordinator:
    image: citusdata/citus:12.1
    container_name: propman-citus-coordinator
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: propman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - citus_coordinator_data:/var/lib/postgresql/data
    networks:
      - propman

  # -----------------------------
  # Citus Worker 1
  # -----------------------------
  citus-worker-1:
    image: citusdata/citus:12.1
    container_name: propman-citus-worker-1
    environment:
      POSTGRES_DB: propman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - citus_worker1_data:/var/lib/postgresql/data
    depends_on:
      - citus-coordinator
    networks:
      - propman

  # -----------------------------
  # Citus Worker 2
  # -----------------------------
  citus-worker-2:
    image: citusdata/citus:12.1
    container_name: propman-citus-worker-2
    environment:
      POSTGRES_DB: propman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - citus_worker2_data:/var/lib/postgresql/data
    depends_on:
      - citus-coordinator
    networks:
      - propman


networks:
  propman:
    driver: bridge


volumes:
  redis_data:
  citus_coordinator_data:
  citus_worker1_data:
  citus_worker2_data: